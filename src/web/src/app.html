<!doctype html>
<html lang="en" class="%framlux.theme%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// If the user has no explicit theme cookie, honor their OS preference.
			// Runs synchronously before any rendering so there's no flash.
			(function () {
				if (document.cookie.indexOf('framlux_theme=') !== -1) {
					return;
				}
				var prefersDark =
					window.matchMedia &&
					window.matchMedia('(prefers-color-scheme: dark)').matches;
				var root = document.documentElement;
				root.classList.remove('light', 'dark');
				root.classList.add(prefersDark ? 'dark' : 'light');
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
		<link rel="icon" type="image/svg+xml" href="/logo.svg" />
		<title>VordFleet</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
