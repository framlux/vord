name: CI • Build, Test, Package

on:
  push:
    branches:
      - prod

env:
  SOLUTION: machine-info.slnx

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.26.x'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0
        with:
          version: 11.1.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source framlux --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Restore
        run: dotnet restore "$SOLUTION"

      - name: Build (Release)
        run: dotnet build "$SOLUTION" -c Release --no-restore

      - name: Run unit tests (services.core)
        run: dotnet run --project test/unit/services.core/unit.services.core.csproj -c Release --no-build

      - name: Run unit tests (server)
        run: dotnet run --project test/unit/server/unit.server.csproj -c Release --no-build

      - name: Run unit tests (database)
        run: dotnet run --project test/unit/database/unit.database.csproj -c Release --no-build

      - name: Run functional tests (web)
        run: dotnet run --project test/functional/web/functional.web.csproj -c Release --no-build

      - name: Run functional tests (grpc)
        run: dotnet run --project test/functional/grpc/functional.grpc.csproj -c Release --no-build

      - name: Run functional tests (hangfire)
        run: dotnet run --project test/functional/hangfire/functional.hangfire.csproj -c Release --no-build

      - name: Run integration tests
        run: dotnet run --project test/integration/integration.csproj -c Release --no-build

      - name: Read version from csproj
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(dotnet msbuild src/server/server.csproj -nologo -getProperty:Version | tail -n 1 | tr -d '\r')
          if [ -z "$VERSION" ]; then
            echo "Version not found"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved VERSION=$VERSION"

      - name: Publish Migration Runner
        run: dotnet publish src/migrationRunner/migrationRunner.csproj -c Release -r linux-x64 --self-contained /t:PublishContainer

      - name: Publish API Server
        run: dotnet publish src/server/server.csproj -c Release -r linux-x64 --self-contained /t:PublishContainer

      - name: Publish Services Worker
        run: dotnet publish src/services.worker/services.worker.csproj -c Release -r linux-x64 --self-contained /t:PublishContainer

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/web

      - name: Type-check web
        run: npx svelte-kit sync && pnpm check
        working-directory: src/web

      - name: Build web
        run: pnpm build
        working-directory: src/web

      - name: Build and push web container
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: src/web
          push: true
          provenance: false
          tags: |
            ghcr.io/framlux/vord/web:${{ env.VERSION }}
            ghcr.io/framlux/vord/web:latest

      - name: Build Go agent (linux-amd64)
        run: >
          GOOS=linux GOARCH=amd64 go build
          -ldflags "-s -w -X main.version=$VERSION -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          -o ./publish/vord-agent-linux-amd64 ./cmd/agent
        working-directory: src/agent

      - name: Build Go agent (linux-arm64)
        run: >
          GOOS=linux GOARCH=arm64 go build
          -ldflags "-s -w -X main.version=$VERSION -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          -o ./publish/vord-agent-linux-arm64 ./cmd/agent
        working-directory: src/agent

      - name: Build Go agent (linux-386)
        run: >
          GOOS=linux GOARCH=386 go build
          -ldflags "-s -w -X main.version=$VERSION -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          -o ./publish/vord-agent-linux-386 ./cmd/agent
        working-directory: src/agent

      - name: Build Go agent (linux-armv7)
        run: >
          GOOS=linux GOARCH=arm GOARM=7 go build
          -ldflags "-s -w -X main.version=$VERSION -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          -o ./publish/vord-agent-linux-arm ./cmd/agent
        working-directory: src/agent

      - name: Tar Go agents
        working-directory: src/agent
        run: |
          tar -czf ./publish/vord-agent-linux-amd64.tar.gz -C ./publish vord-agent-linux-amd64
          tar -czf ./publish/vord-agent-linux-arm64.tar.gz -C ./publish vord-agent-linux-arm64
          tar -czf ./publish/vord-agent-linux-386.tar.gz -C ./publish vord-agent-linux-386
          tar -czf ./publish/vord-agent-linux-arm.tar.gz -C ./publish vord-agent-linux-arm

      - name: Package deb/rpm with nfpm
        working-directory: src/agent
        # L2: pinned to a specific nfpm version so a breaking change upstream cannot silently
        # alter agent packaging mid-release. Bump via Dependabot (gomod ecosystem).
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.3
          nfpm --version

          for arch in amd64 arm64 386 arm; do
            export GOARCH="$arch"
            envsubst < nfpm.yaml > nfpm.resolved.yaml
            nfpm pkg --config nfpm.resolved.yaml --packager deb --target "./publish/vord-agent-${arch}.deb"
            nfpm pkg --config nfpm.resolved.yaml --packager rpm --target "./publish/vord-agent-${arch}.rpm"
          done
          rm -f nfpm.resolved.yaml

      - name: Upload packages to Gemfury
        working-directory: src/agent
        env:
          GEMFURY_TOKEN: ${{ secrets.GEMFURY_TOKEN }}
        # L3: token passed via -u (HTTP Basic auth header) reading from env, so it never appears
        # in the curl process argv where /proc inspection on shared runners could expose it.
        run: |
          for pkg in ./publish/vord-agent-*.deb ./publish/vord-agent-*.rpm; do
            echo "Uploading $pkg"
            curl -sS -F "package=@${pkg}" -u "${GEMFURY_TOKEN}:" https://push.fury.io/framlux/
          done

      - name: Archive Go Agent tarballs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: vord-agent-tarballs
          path: ./src/agent/publish/vord-agent-linux-*.tar.gz

      - name: Archive packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: vord-agent-packages
          path: |
            ./src/agent/publish/vord-agent-*.deb
            ./src/agent/publish/vord-agent-*.rpm
