      - name: Authenticate GitHub Packages
        run: dotnet nuget update source framlux --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dotnet-build

      # ubuntu-latest runners ship with Docker pre-installed and the daemon already running,
      # so Testcontainers.PostgreSql picks up the default Docker socket without extra config.
      - name: Run integration tests
        run: dotnet run --project test/integration/integration.csproj -c Release --no-build
