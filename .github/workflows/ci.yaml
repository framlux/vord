name: CI • Build, Test

on:
  push:
    branches:
      - main

env:
  SOLUTION: machine-info.slnx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.26.x'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a  # v4.4.0
        with:
          version: 11.1.1

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source framlux --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Build (Release)
        run: dotnet build "$SOLUTION" -c Release

      - name: Build Go agent
        run: go build ./...
        working-directory: src/agent

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/web

      - name: Build web
        run: pnpm build
        working-directory: src/web

      - name: Verify mock symbols are not in production bundle
        # Tree-shaking depends on dev resolving to a compile-time false constant in the
        # production bundle. If any module accidentally introduces a non-side-effect-free
        # reference to mock-fixtures, the mock data would ship to customers. Fail the build
        # hard in that case. Scans local build output only — no untrusted GH event input.
        run: |
          if grep -r 'MockApiClient' build/server build/client 2>/dev/null; then
            echo 'ERROR: MockApiClient symbol leaked into production bundle'
            exit 1
          fi
          if grep -r 'mock-fixtures' build/server build/client 2>/dev/null; then
            echo 'ERROR: mock-fixtures path leaked into production bundle'
            exit 1
          fi
        working-directory: src/web

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dotnet-build
          path: |
            src/*/bin/Release
            test/*/bin/Release
            test/*/*/bin/Release
          retention-days: 1

  test-unit-services-core:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source framlux --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dotnet-build

      - name: Run unit tests (services.core)
        run: dotnet run --project test/unit/services.core/unit.services.core.csproj -c Release --no-build

  test-unit-server:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
